# docker-compose runs your whole stack locally with ONE command:
#   docker compose up --build
# It mirrors production (app + Postgres + Redis) so "works on my machine" also
# means "works in the cluster". This file is for LOCAL DEV ONLY, never prod.

services:
  # ----------------------------------------------------------------------
  # Your Node/Socket.IO backend, built from the Dockerfile in this repo.
  # ----------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Restart unless you explicitly stop it (survives crashes during dev).
    restart: unless-stopped
    ports:
      # host:container — reach the API at http://localhost:4000
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: "4000"
      # Service names ("postgres", "redis") resolve via Docker's internal DNS,
      # so the app talks to siblings by name, not localhost.
      DATABASE_URL: "postgresql://postgres:12345@postgres:5432/chatbot?schema=public"
      REDIS_URL: "redis://redis:6379"
      REDIS_ALLOW_INSECURE: "true"
      REDIS_ALLOW_NOAUTH: "true"
    env_file:
      # Pull the rest of your config (JWT secrets, OpenAI key, etc.) from .env.
      - .env
    depends_on:
      # Don't start the app until DB and cache report HEALTHY (see healthchecks).
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------------------
  # PostgreSQL with pgvector (your schema uses vector embeddings).
  # ----------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345"
      POSTGRES_DB: chatbot
    ports:
      - "5432:5432"
    volumes:
      # Named volume = data survives "docker compose down" (but not "down -v").
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------------------
  # Redis — Socket.IO adapter backbone + app cache.
  # ----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

# Named volumes are managed by Docker and persist across container recreation.
volumes:
  pgdata:
  redisdata:
