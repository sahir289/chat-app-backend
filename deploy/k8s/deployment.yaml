# A Deployment is the desired-state controller for your app. You declare "I want
# N identical pods running this image"; Kubernetes continuously makes reality
# match — restarting crashed pods, replacing dead nodes, and rolling out updates.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-backend
  namespace: chatbot
  labels:
    app: chatbot-backend

spec:
  # Start with 3 replicas across AZs for high availability. The HPA will scale
  # this up/down automatically based on load (see hpa.yaml).
  replicas: 3

  selector:
    matchLabels:
      app: chatbot-backend

  # Zero-downtime rolling update: add new pods before removing old ones.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: chatbot-backend

    spec:
      # Future-proofing for AWS IAM Roles for Service Accounts (IRSA).
      # This lets pods access AWS resources without AWS_ACCESS_KEY_ID secrets.
      serviceAccountName: chatbot-backend

      # Give Node time to flush WebSocket connections on shutdown.
      terminationGracePeriodSeconds: 30

      ####################################################################
      # Spread replicas across nodes and AZs.
      #
      # Without this Kubernetes may place all pods on a single node.
      ####################################################################
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: chatbot-backend

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: chatbot-backend
                topologyKey: kubernetes.io/hostname

      containers:
        - name: chatbot-backend

          ##################################################################
          # Jenkins overwrites this image during deployment:
          #
          # kubectl set image deployment/chatbot-backend ...
          #
          # Never rely on latest in production.
          ##################################################################
          image: REPLACE_BY_JENKINS/chatbot-backend:v1

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 4000

          ##################################################################
          # ConfigMap = non-secret config
          # Secret = sensitive values (injected via External Secrets)
          ##################################################################
          envFrom:
            - configMapRef:
                name: chatbot-config
            - secretRef:
                name: chatbot-secrets

          ##################################################################
          # startupProbe:
          # Allows slow startup (DB connection, Redis connection, Prisma init).
          ##################################################################
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            failureThreshold: 30
            periodSeconds: 5

          ##################################################################
          # livenessProbe:
          # Restart deadlocked containers automatically.
          ##################################################################
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          ##################################################################
          # readinessProbe:
          # Remove unhealthy pods from ALB traffic immediately.
          ##################################################################
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          ##################################################################
          # Resource requests/limits.
          #
          # Tune after observing real production traffic.
          ##################################################################
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"

          ##################################################################
          # Defense in depth.
          ##################################################################
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          ##################################################################
          # Writable temp directory because root filesystem is read-only.
          ##################################################################
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}