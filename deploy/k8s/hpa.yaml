# The Horizontal Pod Autoscaler watches live metrics and changes the Deployment's
# replica count automatically: more load → more pods, quiet → fewer pods. This is
# how you handle enterprise traffic spikes without paying for peak capacity 24/7.
# Requires the Kubernetes Metrics Server to be installed in the cluster.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: chatbot-backend
  namespace: chatbot

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chatbot-backend

  minReplicas: 2      # never below 2 → survives an AZ outage
  maxReplicas: 20

  metrics:
    # Scale to keep average CPU around 65% of each pod's REQUESTED cpu.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

  behavior:
    # Scale up fast (handle spikes), scale down slowly (avoid thrashing long-lived
    # WebSocket connections by killing pods too eagerly).
    scaleUp:
      stabilizationWindowSeconds: 30
      
    scaleDown:
      stabilizationWindowSeconds: 300
