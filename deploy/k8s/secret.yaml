# A Secret holds SENSITIVE values (DB URL, JWT secrets, API keys). Kubernetes
# keeps them separate from ConfigMaps, can encrypt them at rest (EKS + KMS), and
# limits access via RBAC.
#
# ⚠️ The values below are PLACEHOLDERS. Do NOT commit real secrets to git.
# In production, prefer one of:
#   - AWS Secrets Manager + External Secrets Operator (recommended), or
#   - "kubectl create secret" from a CI variable, or
#   - Sealed Secrets (encrypted, safe to commit).
#
# stringData lets you write plain text; Kubernetes base64-encodes it for you.
apiVersion: v1
kind: Secret
metadata:
  name: chatbot-secrets
  namespace: chatbot
type: Opaque
stringData:
  # Point at managed AWS RDS PostgreSQL, NOT a pod. sslmode=require for encryption.
  DATABASE_URL: "postgresql://USER:PASSWORD@chatbot-db.xxxx.ap-south-1.rds.amazonaws.com:5432/chatbot?schema=public&sslmode=require"
  # Point at managed ElastiCache for Redis. rediss:// = TLS (required in prod).
  REDIS_URL: "rediss://:PASSWORD@chatbot-redis.xxxx.cache.amazonaws.com:6379"
  JWT_ACCESS_SECRET: "replace-with-strong-random-secret"
  JWT_REFRESH_SECRET: "replace-with-strong-random-secret"
  ENCRYPTION_KEY: "replace-with-strong-random-secret"
  OPENAI_PRO_API_KEY: "sk-replace-me"
  SUPER_ADMIN_EMAIL: "admin@yourplatform.com"
  SUPER_ADMIN_PASSWORD: "replace-me"
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
