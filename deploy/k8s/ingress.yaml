# An Ingress is the public HTTP(S) entrypoint. On EKS, the AWS Load Balancer
# Controller reads this object and provisions a real Application Load Balancer
# (ALB) for you. The ALB terminates TLS and forwards traffic to the Service.
#
# WebSockets note: ALB natively supports WebSocket upgrades, and because your app
# uses the Socket.IO Redis adapter, you do NOT need sticky sessions — any pod can
# serve any client and broadcasts still reach everyone. (If you ever drop the
# Redis adapter, you'd need stickiness; see the guide.)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatbot-backend
  namespace: chatbot
  annotations:
    kubernetes.io/ingress.class: alb
    # internet-facing = public ALB; "ip" target mode routes straight to pods.
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Listen on both 80 and 443...
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    # ...and auto-redirect HTTP → HTTPS.
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    # ACM certificate ARN for your domain (TLS termination at the ALB).
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-south-1:123456789012:certificate/REPLACE-ME"
    # ALB health checks hit the same endpoint Kubernetes uses.
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - host: api.yourplatform.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatbot-backend
                port:
                  number: 80
